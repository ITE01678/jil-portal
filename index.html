  <!--
    Single-Page App redirect for GitHub Pages.
    GitHub Pages serves 404.html for unknown paths.
    404.html encodes the real path into the query string.
    This script restores it before React Router boots.
  -->
  <script>
    (function () {
      var redirect = sessionStorage.getItem("gh-pages-redirect");
      if (redirect) {
        sessionStorage.removeItem("gh-pages-redirect");
        var url = new URL(redirect, window.location.origin);
        window.history.replaceState(null, null,
          url.pathname + url.search + url.hash
        );
      }
    }());
  </script>
